services:
  # Backend API
  - type: web
    name: eventsphere-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_EXPIRE
        value: 7d

      - key: MONGODB_URI
        sync: false

      - key: USE_MOCK_PAYMENTS
        value: "true"

      - key: USE_MOCK_CLOUDINARY
        value: "true"

      - key: SMTP_HOST
        value: smtp.gmail.com

      - key: SMTP_PORT
        value: "587"

      - key: SMTP_USER
        sync: false

      - key: SMTP_PASS
        sync: false

      - key: SMTP_FROM
        value: noreply@eventsphere.com

  # Frontend React App
  - type: web
    name: eventsphere-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        sync: false